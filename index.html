<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面積換算 · 建物本体価格</title>
  <meta name="description" content="畳・坪・平米をリアルタイムで換算し、建物本体価格（税抜・税込）を自動計算します。">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass:        rgba(255,255,255,0.68);
      --glass-border: rgba(255,255,255,0.82);
      --sep:          rgba(0,0,0,0.07);
      --btn:          rgba(255,255,255,0.60);
      --btn-border:   rgba(0,0,0,0.10);
      --ref:          rgba(255,255,255,0.55);
      --ref-border:   rgba(255,255,255,0.75);
      --shadow-lg:    0 12px 40px rgba(70,60,50,0.15), 0 2px 6px rgba(70,60,50,0.08);
      --shadow-sm:    0 3px 12px rgba(70,60,50,0.10);
      --text-1: #1a1916;
      --text-2: #6b6966;
      --text-3: #b2afa9;
      --r-xl: 22px; --r-lg: 16px; --r-md: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --glass:        rgba(34,32,30,0.76);
        --glass-border: rgba(255,255,255,0.11);
        --sep:          rgba(255,255,255,0.08);
        --btn:          rgba(255,255,255,0.07);
        --btn-border:   rgba(255,255,255,0.14);
        --ref:          rgba(36,34,32,0.70);
        --ref-border:   rgba(255,255,255,0.10);
        --shadow-lg:    0 12px 40px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.25);
        --shadow-sm:    0 3px 12px rgba(0,0,0,0.30);
        --text-1: #edecea;
        --text-2: #a8a5a1;
        --text-3: #6a6764;
      }
    }

    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #d8cfbf;
      background-image:
        radial-gradient(ellipse 90% 70% at 15%  5%,  rgba(215,202,182,0.95) 0%, transparent 55%),
        radial-gradient(ellipse 65% 55% at 85% 85%,  rgba(188,202,215,0.80) 0%, transparent 52%),
        radial-gradient(ellipse 55% 65% at 55% 35%,  rgba(225,215,198,0.55) 0%, transparent 50%),
        radial-gradient(ellipse 40% 40% at 90% 15%,  rgba(202,215,210,0.45) 0%, transparent 45%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3.5rem 1.25rem 5rem;
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #1c1a18;
        background-image:
          radial-gradient(ellipse 90% 70% at 15%  5%,  rgba(48,43,38,0.95) 0%, transparent 55%),
          radial-gradient(ellipse 65% 55% at 85% 85%,  rgba(33,42,50,0.85) 0%, transparent 52%),
          radial-gradient(ellipse 55% 65% at 55% 35%,  rgba(44,41,36,0.60) 0%, transparent 50%);
      }
    }

    .container { width: 100%; max-width: 520px; }

    /* ── header ── */
    .header { margin-bottom: 1.75rem; }
    .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: .13em; color: var(--text-3); margin-bottom: 5px; }
    .title   { font-size: 27px; font-weight: 600; letter-spacing: -.025em; color: var(--text-1); }

    /* ── unit card (single glass panel, 3 rows) ── */
    .unit-card {
      background: var(--glass);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin-bottom: 8px;
    }

    .unit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--sep);
    }
    .unit-row:last-child { border-bottom: none; }

    .unit-label {
      display: flex;
      align-items: baseline;
      gap: 5px;
      width: 54px;
      flex-shrink: 0;
    }
    .uk { font-size: 17px; font-weight: 600; color: var(--text-1); }
    .us { font-size: 10px; color: var(--text-3); }

    .unit-input {
      flex: 1;
      min-width: 0;
      font-size: 22px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      background: transparent;
      color: var(--text-1);
      outline: none;
      padding: 0;
      caret-color: var(--text-2);
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* grouped stepper — [−│+] adjacent, one thumb zone */
    .stepper {
      display: flex;
      flex-shrink: 0;
      border: 1px solid var(--btn-border);
      border-radius: var(--r-md);
      overflow: hidden;
      background: var(--btn);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .st-btn {
      width: 38px;
      height: 38px;
      background: transparent;
      border: none;
      color: var(--text-2);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background .1s, color .1s, transform .07s;
    }
    .st-btn:hover  { background: rgba(255,255,255,0.55); color: var(--text-1); }
    .st-btn:active { transform: scale(0.87); opacity: .6; }
    .st-div { width: 1px; background: var(--btn-border); flex-shrink: 0; }

    /* ── price card ── */
    .price-card {
      background: var(--glass);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      padding: 1.1rem 1.2rem;
      display: flex;
      align-items: center;          /* vertical centering */
      justify-content: space-between;
      gap: 1rem;
    }
    .pc-left  { display: flex; flex-direction: column; gap: 3px; }
    .pc-lbl   { font-size: 11px; font-weight: 500; letter-spacing: .05em; color: var(--text-3); }
    .pc-rate  { font-size: 10px; color: var(--text-3); }

    .pc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
    .pl       { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; }
    .ptag     { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: .04em; flex-shrink: 0; }
    .pex {
      font-size: 25px; font-weight: 600;
      letter-spacing: -.03em; color: var(--text-1);
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .pex.empty  { color: var(--text-3); font-size: 19px; font-weight: 400; }
    .pinc {
      font-size: 16px; font-weight: 500;
      color: var(--text-2); font-variant-numeric: tabular-nums; line-height: 1;
    }
    .pinc.empty { color: var(--text-3); font-weight: 400; font-size: 14px; }

    /* ── presets ── */
    .section-gap { margin-top: 1.1rem; }
    .ref-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: .09em; color: var(--text-3); margin-bottom: 9px; padding-left: 2px; }
    .ref-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 7px;
    }
    .ri {
      background: var(--ref);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid var(--ref-border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      padding: 10px 11px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s, box-shadow .12s;
    }
    .ri:hover  { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(70,60,50,0.15); }
    .ri:active { transform: scale(0.96); opacity: .8; }
    .rn { font-size: 11px; color: var(--text-2); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rv { font-size: 12px; font-weight: 600; color: var(--text-1); white-space: nowrap; }
    .rv em { font-style: normal; color: var(--text-3); font-weight: 400; font-size: 10px; }

    /* ── footnote ── */
    .footnote { text-align: center; font-size: 10px; color: var(--text-3); margin-top: 1.4rem; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <p class="eyebrow">面積単位換算</p>
    <h1 class="title">畳 · 坪 · 平米</h1>
  </div>

  <div class="unit-card">
    <div class="unit-row">
      <div class="unit-label"><span class="uk">畳</span><span class="us">じょう</span></div>
      <input class="unit-input" type="number" id="jo"    placeholder="—" min="0" step="0.5" inputmode="decimal" oninput="fromJo(this.value)">
      <div class="stepper">
        <button class="st-btn" onclick="step('jo',-0.5)">−</button>
        <div class="st-div"></div>
        <button class="st-btn" onclick="step('jo',0.5)">+</button>
      </div>
    </div>
    <div class="unit-row">
      <div class="unit-label"><span class="uk">坪</span><span class="us">つぼ</span></div>
      <input class="unit-input" type="number" id="tsubo" placeholder="—" min="0" step="0.5" inputmode="decimal" oninput="fromTsubo(this.value)">
      <div class="stepper">
        <button class="st-btn" onclick="step('tsubo',-0.5)">−</button>
        <div class="st-div"></div>
        <button class="st-btn" onclick="step('tsubo',0.5)">+</button>
      </div>
    </div>
    <div class="unit-row">
      <div class="unit-label"><span class="uk">㎡</span><span class="us">平米</span></div>
      <input class="unit-input" type="number" id="m2"    placeholder="—" min="0" step="0.5" inputmode="decimal" oninput="fromM2(this.value)">
      <div class="stepper">
        <button class="st-btn" onclick="step('m2',-0.5)">−</button>
        <div class="st-div"></div>
        <button class="st-btn" onclick="step('m2',0.5)">+</button>
      </div>
    </div>
  </div>

  <div class="price-card">
    <div class="pc-left">
      <span class="pc-lbl">建物本体価格</span>
      <span class="pc-rate" id="pc-rate"></span>
    </div>
    <div class="pc-right">
      <div class="pl"><span class="ptag">税抜</span><span class="pex empty" id="pr-ex">—</span></div>
      <div class="pl"><span class="ptag">税込</span><span class="pinc empty" id="pr-inc">—</span></div>
    </div>
  </div>

  <div class="section-gap">
    <p class="ref-eyebrow">間取りの目安</p>
    <div class="ref-grid">
      <div class="ri" onclick="setJo(4.5)">
        <div class="rn">4.5畳・和室</div><div class="rv">7.45 m² <em>/ 2.25坪</em></div>
      </div>
      <div class="ri" onclick="setJo(6)">
        <div class="rn">6畳・洋室</div><div class="rv">9.94 m² <em>/ 3.01坪</em></div>
      </div>
      <div class="ri" onclick="setJo(8)">
        <div class="rn">8畳・LDK</div><div class="rv">13.25 m² <em>/ 4.01坪</em></div>
      </div>
      <div class="ri" onclick="setJo(20)">
        <div class="rn">20畳・リビング</div><div class="rv">33.12 m² <em>/ 10坪</em></div>
      </div>
      <div class="ri" onclick="setTsubo(30)">
        <div class="rn">30坪・一戸建て</div><div class="rv">99.17 m² <em>/ 59.9畳</em></div>
      </div>
    </div>
  </div>

  <p class="footnote" id="footnote"></p>

</div>
<script>
  /* ── 定数 ── すべての表示値はここから自動生成 */
  const JO_W      = 910;       // 畳の短辺 mm
  const JO_H      = 1820;      // 畳の長辺 mm
  const TSU_M2    = 3.3057;    // 1坪 in m²
  const UNIT_PRICE= 237160;    // 建物本体単価 円/m²
  const TAX_RATE  = 0.10;      // 消費税率

  const JO_M2 = JO_W / 1000 * JO_H / 1000;

  /* 初期テキスト */
  document.getElementById('pc-rate').textContent =
    UNIT_PRICE.toLocaleString() + ' 円 / m²';
  document.getElementById('footnote').textContent =
    '1畳 = ' + JO_W + ' × ' + JO_H + ' mm\u3000·\u30001坪 = ' + TSU_M2 + ' m²\u3000·\u3000消費税率 = ' + (TAX_RATE * 100) + '%';

  /* ── 換算 ── */
  function fmt(v) {
    if (isNaN(v)) return '';
    const n = parseFloat(v);
    return n === 0 ? '0' : parseFloat(n.toFixed(4)).toString();
  }
  function kanji(p) {
    const m = Math.floor(p / 10000), o = Math.floor(m / 10000);
    if (o > 0) { const r = m % 10000; return o + '億' + (r > 0 ? r.toLocaleString() + '万' : '') + '円'; }
    if (m > 0) { const r = p % 10000; return m.toLocaleString() + '万' + (r > 0 ? r.toLocaleString() + '円' : '円'); }
    return p.toLocaleString() + '円';
  }
  function updatePrice(m2) {
    const ex = document.getElementById('pr-ex'), inc = document.getElementById('pr-inc');
    if (isNaN(m2) || m2 <= 0) {
      ex.textContent  = '—'; ex.className  = 'pex empty';
      inc.textContent = '—'; inc.className = 'pinc empty';
      return;
    }
    const p = Math.round(m2 * UNIT_PRICE);
    ex.textContent  = kanji(p);                        ex.className  = 'pex';
    inc.textContent = kanji(Math.round(p * (1 + TAX_RATE))); inc.className = 'pinc';
  }
  function fromJo(v) {
    const n = parseFloat(v);
    if (isNaN(n)) { document.getElementById('tsubo').value = ''; document.getElementById('m2').value = ''; updatePrice(NaN); return; }
    const m2 = n * JO_M2;
    document.getElementById('m2').value    = fmt(m2);
    document.getElementById('tsubo').value = fmt(m2 / TSU_M2);
    updatePrice(m2);
  }
  function fromTsubo(v) {
    const n = parseFloat(v);
    if (isNaN(n)) { document.getElementById('jo').value = ''; document.getElementById('m2').value = ''; updatePrice(NaN); return; }
    const m2 = n * TSU_M2;
    document.getElementById('m2').value = fmt(m2);
    document.getElementById('jo').value = fmt(m2 / JO_M2);
    updatePrice(m2);
  }
  function fromM2(v) {
    const n = parseFloat(v);
    if (isNaN(n)) { document.getElementById('jo').value = ''; document.getElementById('tsubo').value = ''; updatePrice(NaN); return; }
    document.getElementById('jo').value    = fmt(n / JO_M2);
    document.getElementById('tsubo').value = fmt(n / TSU_M2);
    updatePrice(n);
  }
  function setJo(v)    { document.getElementById('jo').value    = v; fromJo(v); }
  function setTsubo(v) { document.getElementById('tsubo').value = v; fromTsubo(v); }
  function setM2(v)    { document.getElementById('m2').value    = v; fromM2(v); }

  /* ── ステッパー（0.5グリッドスナップ） ── */
  function step(id, delta) {
    const el  = document.getElementById(id);
    const cur = parseFloat(el.value) || 0;
    const onGrid = Math.abs(cur - Math.round(cur / 0.5) * 0.5) < 1e-9;
    let next = onGrid ? cur + delta
                      : delta > 0 ? Math.ceil(cur  / 0.5) * 0.5
                                  : Math.floor(cur / 0.5) * 0.5;
    el.value = Math.max(0, parseFloat(next.toFixed(2)));
    el.dispatchEvent(new Event('input'));
  }
</script>
</body>
</html>
